[build]
  publish = "."

# Headers corretos para os scripts serem executáveis via curl/irm
[[headers]]
  for = "/install.sh"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Content-Disposition = "inline"
    Cache-Control = "no-cache"

[[headers]]
  for = "/install.ps1"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Content-Disposition = "inline"
    Cache-Control = "no-cache"

# Redireciona / para a landing
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
